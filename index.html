<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>店舗売上・最適化計算機</title>
    <style>
        :root {
            --bg-color: #1a1c23;
            --panel-bg: #242835;
            --accent-color: #ffb703;
            --text-color: #f8f9fa;
            --text-muted: #98a6ad;
            --border-color: #3b4256;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: var(--accent-color);
            font-size: 24px;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .section-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
            border-left: 4px solid var(--accent-color);
            padding-left: 8px;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 25px;
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
        .slot {
            background: rgba(0, 0, 0, 0.2);
            border: 2px dashed var(--border-color);
            border-radius: 6px;
            padding: 10px;
            text-align: center;
            min-height: 90px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        select {
            width: 100%;
            background: #2d3243;
            color: #fff;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 6px;
            font-size: 12px;
            margin-bottom: 5px;
            outline: none;
        }
        select:focus {
            border-color: var(--accent-color);
        }
        .unlocked-container {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: var(--text-muted);
        }
        .material-panel {
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 25px;
        }
        .material-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .material-label {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #2d3243;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .material-label:hover {
            border-color: var(--accent-color);
        }
        .result-panel {
            background: #2d3243;
            border: 2px solid var(--accent-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .total-revenue {
            font-size: 32px;
            font-weight: bold;
            color: var(--accent-color);
            text-align: center;
            margin-bottom: 15px;
        }
        .total-revenue span {
            font-size: 16px;
            color: var(--text-color);
            margin-left: 5px;
        }
        .item-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
        }
        .item-card {
            background: var(--panel-bg);
            padding: 10px;
            border-radius: 6px;
            border-left: 4px solid #4a5568;
            font-size: 13px;
        }
        .item-card.drink { border-left-color: #0ea5e9; }
        .item-card.dessert { border-left-color: #ec4899; }
        .item-card.main { border-left-color: #eab308; }
        .item-card-name { font-weight: bold; margin-bottom: 4px; }
        .item-card-rev { color: #10b981; text-align: right; font-weight: bold; }

        .btn-optimize {
            display: block;
            width: 100%;
            background: #10b981;
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: background 0.2s;
        }
        .btn-optimize:hover {
            background: #059669;
        }
        
        /* 全キャラ管理リスト用の新スタイル */
        .roster-panel {
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 25px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 10px;
        }
        .roster-item {
            background: #2d3243;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .roster-item.owned {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.05);
        }
        .roster-header {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: bold;
        }

        .save-panel {
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 25px;
        }
        .save-flex {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .save-input {
            flex: 1;
            background: #1a1c23;
            color: var(--accent-color);
            border: 1px solid var(--border-color);
            padding: 8px;
            font-family: monospace;
            font-size: 12px;
            border-radius: 4px;
        }
        .btn-save {
            background: #3b4256;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        .btn-save:hover {
            background: #4b526d;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>SHOP STOPWATCH OPTIMIZER</h1>

    <div class="section-title">店舗配置 - 従業員スロット (最大10名)</div>
    <div class="grid-container" id="char-slots" style="grid-template-columns: repeat(5, 1fr);"></div>

    <div class="section-title">店舗配置 - メニュー設定 (5品)</div>
    <div class="grid-container" id="menu-slots" style="grid-template-columns: repeat(5, 1fr);"></div>

    <div class="section-title">発動中の原材料バフ</div>
    <div class="material-panel">
        <div class="material-tags" id="material-box"></div>
    </div>

    <div class="result-panel">
        <div class="section-title" style="border-left-color: #10b981;">現在の店舗予測時給</div>
        <div class="total-revenue" id="total-revenue">0.00<span>/h</span></div>
        <div class="item-list" id="item-breakdown"></div>
    </div>

    <button class="btn-optimize" id="btn-optimize">⚡ 所持状況から最強の配置を自動計算する</button>

    <div class="section-title">全キャラクター所持・育成管理 (最適化の計算元になります)</div>
    <div class="roster-panel" id="roster-box"></div>

    <div class="section-title">データの保存と読込 (インポート / エクスポート)</div>
    <div class="save-panel">
        <span style="font-size: 12px; color: var(--text-muted);">
            現在登録されている「全キャラの所持状況とレベル」を暗号化コードにして保存・復元できます。
        </span>
        <div class="save-flex">
            <input type="text" id="save-data-code" class="save-input" readonly placeholder="ここに保存コードがでます">
            <button class="btn-save" id="btn-export">コード作成</button>
            <button class="btn-save" id="btn-import" style="background:#0ea5e9">読込適用</button>
        </div>
    </div>
</div>

<script type="module" src="./main.js"></script>
</body>
</html>
